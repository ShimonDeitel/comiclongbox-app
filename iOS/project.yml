name: Comic Longbox
options:
  bundleIdPrefix: com.shimondeitel.comiclongbox
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Comic Longbox:
    type: application
    platform: iOS
    sources:
      - path: Comic Longbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.comiclongbox
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Comic Longbox/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Comic LongboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Comic LongboxTests
      - path: Comic Longbox.storekit
    dependencies:
      - target: Comic Longbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.comiclongbox.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Comic LongboxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Comic LongboxUITests
    dependencies:
      - target: Comic Longbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.comiclongbox.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Comic Longbox:
    build:
      targets:
        Comic Longbox: all
        Comic LongboxTests: [test]
        Comic LongboxUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Comic Longbox.storekit
    test:
      config: Debug
      storeKitConfiguration: Comic Longbox.storekit
      targets:
        - Comic LongboxTests
        - Comic LongboxUITests
    archive:
      config: Release
